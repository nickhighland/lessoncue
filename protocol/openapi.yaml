openapi: 3.1.0
info:
  title: LessonCue Local API
  version: 3.2.0
  description: Versioned contract used by the LessonCue administration UI and native TV clients.
servers:
  - url: http://lessoncue.local
paths:
  /.well-known/lessoncue:
    get:
      operationId: discoverServer
      responses:
        '200':
          description: Public local-network discovery document
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Discovery' }
  /api/v1/pairing/request:
    post:
      operationId: requestPairing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PairingRequest' }
      responses:
        '202':
          description: Pairing request is waiting for PIN confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId: { type: string, format: uuid }
                  expiresAt: { type: string, format: date-time }
  /api/v1/pairing/confirm:
    post:
      operationId: confirmPairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, pin]
              properties:
                requestId: { type: string, format: uuid }
                pin: { type: string, pattern: '^[0-9]{6}$' }
      responses:
        '200':
          description: Device credential and initial identity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingResult' }
        '400': { description: Expired or invalid PIN }
        '429': { description: Too many attempts }
  /api/v1/classes:
    get:
      operationId: listClasses
      responses:
        '200':
          description: Classes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Class' }
    post:
      operationId: createClass
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClassInput' }
      responses:
        '201': { description: Created }
  /api/v1/classes/{id}:
    put:
      operationId: updateClass
      description: Updates class details and its room-specific controller path, theme, and optional hostname. Requires planning.manage.
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClassInput' }
      responses:
        '200': { description: Updated class }
        '409': { description: Controller path is already assigned }
    delete:
      operationId: recycleClass
      description: Requires planning.manage. Moves a class and its active lessons into the 30-day recycling bin.
      responses:
        '204': { description: Class and lessons recycled }
  /api/v1/lessons:
    get:
      operationId: listLessons
      responses:
        '200':
          description: Lessons ordered by date
    post:
      operationId: createLesson
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonInput' }
      responses:
        '201': { description: Created }
  /api/v1/lessons/bulk:
    post:
      operationId: updateLessonsInBulk
      description: Archives, restores, moves, shifts, prefixes, or permanently deletes as many as 500 lessons in one transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonBulkInput' }
      responses:
        '200': { description: Bulk lesson action completed }
        '400': { description: Invalid selection, action, destination, shift, or title prefix }
        '404': { description: A selected lesson or destination class no longer exists }
  /api/v1/lessons/{lessonId}/relocate:
    post:
      operationId: copyOrMoveLesson
      description: Copies a complete lesson or moves it to another class/date while preserving notes, cue settings, scheduled-time offsets, and media retention.
      parameters:
        - { name: lessonId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonRelocateInput' }
      responses:
        '200': { description: Lesson moved }
        '201': { description: Lesson copy created }
        '400': { description: Invalid action, class, date, or title }
        '404': { description: Source lesson or destination class not found }
  /api/v1/playlist-items/bulk:
    post:
      operationId: updatePlaylistItemsInBulk
      description: Removes or updates role, volume, ending, skipping, or title prefix for as many as 500 lesson cues.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaylistItemBulkInput' }
      responses:
        '200': { description: Bulk playlist action completed and affected manifests invalidated }
        '400': { description: Invalid selection, action, role, volume, ending, or title prefix }
        '404': { description: A selected playlist item no longer exists }
  /api/v1/lessons/{lessonId}/items:
    post:
      operationId: addPlaylistItem
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaylistItemInput' }
      responses:
        '201': { description: Created and manifest invalidated }
        '404': { description: Lesson not found }
  /api/v1/lesson-templates:
    get:
      operationId: listLessonTemplates
      responses:
        '200':
          description: Reusable lesson structures with ordered cue snapshots and schedule counts
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/LessonTemplate' } }
  /api/v1/lesson-templates/from-lesson:
    post:
      operationId: createLessonTemplateFromLesson
      description: Captures playlist, timing, pre-roll, countdown, offline, trim, fade, cue, and media settings. Referenced lesson-scoped media becomes permanent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateFromLessonInput' }
      responses:
        '201': { description: Template created }
        '404': { description: Source lesson not found }
  /api/v1/lesson-templates/{templateId}:
    put:
      operationId: updateLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateUpdateInput' }
      responses:
        '200': { description: Template defaults updated }
        '404': { description: Template not found }
    delete:
      operationId: deleteLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Template and its schedules deleted; generated lessons preserved }
  /api/v1/lesson-templates/{templateId}/replace-from-lesson:
    post:
      operationId: replaceLessonTemplateStructure
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lessonId]
              properties:
                lessonId: { type: string, format: uuid }
      responses:
        '200': { description: Playlist and timing structure replaced while template identity and schedules remain }
        '404': { description: Template or lesson not found }
  /api/v1/lesson-templates/{templateId}/instantiate:
    post:
      operationId: instantiateLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateInstantiateInput' }
      responses:
        '201': { description: One dated lesson created from the template }
        '404': { description: Template or class not found }
  /api/v1/recurring-schedules:
    get:
      operationId: listRecurringLessonSchedules
      responses:
        '200': { description: Recurring schedules with generated counts and explicit exception dates }
    post:
      operationId: createRecurringLessonSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringScheduleInput' }
      responses:
        '201': { description: Schedule created and enabled occurrences generated idempotently }
        '400': { description: Invalid recurrence, template, or class }
  /api/v1/recurring-schedules/{scheduleId}:
    put:
      operationId: updateRecurringLessonSchedule
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringScheduleInput' }
      responses:
        '200': { description: Schedule updated and missing enabled occurrences generated }
    delete:
      operationId: deleteRecurringLessonSchedule
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Schedule deleted; generated lessons preserved }
  /api/v1/recurring-schedules/{scheduleId}/generate:
    post:
      operationId: generateRecurringLessons
      description: Materializes missing occurrences only; rerunning never duplicates a schedule date.
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                throughDate: { type: [string, 'null'], format: date }
      responses:
        '200': { description: Number of newly generated lessons }
  /api/v1/recurring-schedules/{scheduleId}/exception:
    post:
      operationId: setRecurringScheduleException
      description: Excluding a date removes that schedule's generated lesson; restoring it regenerates the missing occurrence.
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, excluded]
              properties:
                date: { type: string, format: date }
                excluded: { type: boolean }
      responses:
        '200': { description: Exception list and occurrence updated }
  /api/v1/signage:
    get:
      operationId: listSignage
      description: Returns signage schedules with current activity, next transition, targeting, and server-media readiness.
      responses:
        '200':
          description: Ordered signage schedules
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Signage' }
    post:
      operationId: createSignage
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignageInput' }
      responses:
        '201': { description: Signage schedule created }
        '400': { description: Invalid schedule, target, media, or color }
  /api/v1/signage/{signageId}:
    put:
      operationId: updateSignage
      parameters:
        - { name: signageId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SignageInput' }
      responses:
        '200': { description: Signage schedule updated }
        '400': { description: Invalid schedule, target, media, or color }
        '404': { description: Signage schedule not found }
    delete:
      operationId: deleteSignage
      parameters:
        - { name: signageId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Signage schedule deleted }
        '404': { description: Signage schedule not found }
  /api/v1/signage/{signageId}/widgets/refresh:
    post:
      operationId: refreshSignageWidgets
      description: Immediately refreshes every approved online source in the selected signage layout while retaining last-known-good cached content on failure.
      parameters:
        - { name: signageId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Refresh completed }
        '404': { description: Signage schedule not found }
  /api/v1/playlist-items/{itemId}:
    patch:
      operationId: updatePlaylistItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaylistItemUpdateInput' }
      responses:
        '200': { description: Updated and manifest invalidated }
        '400': { description: Invalid trim, fade, or cue marker }
        '404': { description: Playlist item not found }
  /api/v1/screens/{screenId}/manifest:
    get:
      operationId: getScreenManifest
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Complete offline synchronization manifest
          content:
            application/json:
              schema: { $ref: './manifest.schema.json' }
  /api/v1/screens/{screenId}/control:
    get:
      operationId: getScreenControlCommand
      description: Device-authenticated command cursor. Omit `after` at startup to establish a baseline without replaying an old command, then poll with the last version.
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: after
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Latest command and whether it is newer than the supplied cursor
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScreenControlCommand' }
        '401': { description: Device credential is invalid or revoked }
    post:
      operationId: sendScreenControlCommand
      description: Sends an ordered playback command from an authenticated local browser controller.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: X-LessonCue-Controller
          in: header
          required: false
          description: Browser controller scope (`room:{classId}` or `universal`). Room scope is checked against screen and lesson assignments.
          schema: { type: string }
        - name: X-LessonCue-Controller-Grant
          in: header
          required: false
          description: Opaque 12-hour grant returned after rate-limited PIN validation; required for universal browser-controller commands.
          schema: { type: string, pattern: '^[0-9a-f]{64}$' }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScreenControlInput' }
      responses:
        '202': { description: Command saved for the screen }
        '400': { description: Invalid command, lesson, or playlist item }
        '404': { description: Screen not found }
  /api/v1/controller/unlock:
    post:
      operationId: unlockUniversalController
      description: Requires playback.control. Validates the separately configured universal-controller PIN.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControllerPinInput' }
      responses:
        '200': { description: PIN accepted; returns an opaque 12-hour universal-controller grant }
        '403': { description: PIN not accepted }
        '409': { description: An administrator has not configured a PIN }
  /api/v1/controller/sessions:
    post:
      operationId: createTemporaryControllerSession
      description: Requires planning.manage. Creates an in-memory, expiring controller URL restricted to one class and optionally one lesson.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TemporaryControllerSessionInput' }
      responses:
        '201': { description: One-time temporary controller URL and expiry }
  /api/v1/controller/sessions/{token}:
    get:
      operationId: getTemporaryControllerSession
      description: Requires playback.control. Resolves an unexpired temporary controller scope.
      parameters:
        - name: token
          in: path
          required: true
          schema: { type: string, pattern: '^[0-9a-f]{48}$' }
      responses:
        '200': { description: Active restricted scope }
        '404': { description: Link is invalid, expired, or was cleared by a server restart }
  /api/v1/tv/status:
    post:
      operationId: reportTvStatus
      security: [{ deviceBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TvStatus' }
      responses:
        '202': { description: Accepted }
  /api/v1/screens/{screenId}/diagnostics/screenshot-request:
    post:
      operationId: requestScreenDiagnosticScreenshot
      description: Requires screens.manage. Creates a one-time request only when the screen-specific privacy opt-in is enabled and the player is online.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: One-time 60-second request created }
        '409': { description: 'Screenshot access is disabled or the player is offline' }
  /api/v1/screens/{screenId}/diagnostics/screenshot:
    get:
      operationId: getScreenDiagnosticScreenshot
      description: Requires screens.manage. Returns the latest unexpired screenshot for this screen.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Latest diagnostic image
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        '404': { description: No unexpired screenshot }
    delete:
      operationId: deleteScreenDiagnosticScreenshot
      description: Requires screens.manage. Immediately deletes the stored diagnostic image and request metadata.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Screenshot deleted }
  /api/v1/tv/screens/{screenId}/diagnostics/screenshot/{requestId}:
    put:
      operationId: uploadTvDiagnosticScreenshot
      description: Fulfills an administrator-enabled, one-time request that expires after 60 seconds. The player displays a visible capture notice; the server retains only the latest image for 24 hours.
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          image/jpeg: { schema: { type: string, format: binary, maxLength: 8388608 } }
          image/png: { schema: { type: string, format: binary, maxLength: 8388608 } }
      responses:
        '202': { description: Screenshot accepted }
        '400': { description: Invalid or oversized image }
        '409': { description: 'Request is disabled, expired, or already fulfilled' }
  /api/v1/media/{mediaId}/file:
    get:
      operationId: downloadMedia
      description: Range-enabled media on the trusted local television network. Device manifests remain bearer-authenticated.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Media file }
        '206': { description: Partial media response }
        '404': { description: Not found }
  /api/v1/media/{mediaId}/playback:
    get:
      operationId: streamCompatibleMedia
      description: Streams the original when it meets the shared TV codec policy, otherwise the locally generated H.264/AAC MP4 derivative. Supports byte ranges and strong ETags.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: TV-compatible playback media }
        '206': { description: Partial playback media range }
        '404': { description: Media or compatible file not found }
  /api/v1/media/{mediaId}/transcodes/{profile}:
    get:
      operationId: streamAdaptiveMedia
      description: Range-enabled locally generated adaptive H.264/AAC media selected by a device manifest. Supports strong ETags.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: profile
          in: path
          required: true
          schema: { enum: [h264-720, h264-480] }
      responses:
        '200': { description: Adaptive playback media }
        '206': { description: Partial adaptive media range }
        '404': { description: Profile is absent, stale, or not ready }
    post:
      operationId: queueAdaptiveMedia
      description: Requires uploads.manage. Queues one adaptive profile or both profiles for local generation. Reuses a current ready copy and retries failed or stale copies.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: profile
          in: path
          required: true
          schema: { enum: [h264-720, h264-480, all] }
      responses:
        '202': { description: Requested profiles are queued or already available }
        '400': { description: Media is not a processed local video or profile is invalid }
        '404': { description: Media not found }
  /api/v1/hardware-acceleration/check:
    post:
      operationId: checkHardwareAcceleration
      description: Requires settings.manage. Rechecks FFmpeg Intel QSV and Linux VAAPI support by encoding and validating a small local H.264 MP4 probe.
      responses:
        '200':
          description: Current Intel hardware encoding capability and recent usage/fallback status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HardwareAccelerationStatus' }
  /api/v1/backups/restore/preview:
    post:
      operationId: previewBackupRestore
      description: Stages and validates a LessonCue ZIP without changing current data.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Validated restore preview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupPreview' }
        '400': { description: Invalid, unsafe, corrupt, or oversized backup }
  /api/v1/backups/restore:
    post:
      operationId: restoreBackup
      description: Revalidates the staged archive, creates a full safety backup, then restores database and optional media while preserving server-local identity and connection settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restoreId, confirmation]
              properties:
                restoreId: { type: string, format: uuid }
                confirmation: { type: string, const: RESTORE }
      responses:
        '200':
          description: Restore completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupRestoreResult' }
        '400': { description: Invalid confirmation or expired staged backup }
        '409': { description: Another restore is running }
  /api/v1/media/{mediaId}/filmstrip:
    get:
      operationId: getMediaFilmstrip
      description: Locally generated six-frame JPEG used by the visual timeline editor.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Filmstrip JPEG }
        '404': { description: Derivative is not available }
  /api/v1/media/{mediaId}/waveform:
    get:
      operationId: getMediaWaveform
      description: Locally generated PNG waveform used by the visual timeline editor.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Waveform PNG }
        '404': { description: Derivative is not available }
  /api/v1/media/{mediaId}/impact:
    get:
      operationId: getMediaImpact
      description: Lists every lesson cue and sign that currently uses the media, plus locally archived versions.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Media usage and version history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaImpact' }
        '404': { description: Media not found }
  /api/v1/media/{mediaId}/organize:
    patch:
      operationId: organizeMedia
      description: Renames a media item and assigns its local folder and tags without changing lesson references.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaOrganizeInput' }
      responses:
        '200': { description: Media organized }
        '400': { description: Invalid display name }
        '404': { description: Media not found }
  /api/v1/media/{mediaId}/reprocess:
    post:
      operationId: reprocessMedia
      description: Clears derived metadata and queues local FFprobe/FFmpeg processing again without replacing the original.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Reprocessing queued }
        '400': { description: Media has no local file }
        '409': { description: Media is already processing }
  /api/v1/media/{mediaId}/convert:
    post:
      operationId: convertPresentation
      description: Queues a fully local LibreOffice/Poppler conversion of PDF, PowerPoint, OpenDocument Presentation, Keynote, or Word media into screen-ready PNG assets.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Conversion queued }
        '400': { description: Unsupported or online-only source }
        '409': { description: Conversion already queued or running }
  /api/v1/media/{mediaId}/convert-and-add-to-lesson:
    post:
      operationId: convertPresentationAndAddToLesson
      description: Queues local slide conversion and records a lesson target so generated slides are appended automatically. If current converted slides are ready, appends them immediately.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresentationLessonInput' }
      responses:
        '200': { description: Existing converted slides appended immediately }
        '202': { description: Conversion and automatic lesson insertion queued }
        '400': { description: Unsupported or online-only source }
        '404': { description: Source or lesson not found }
  /api/v1/media/{mediaId}/conversion/add-to-lesson:
    post:
      operationId: addConvertedSlidesToLesson
      description: Adds the latest converted slide assets to a lesson in page order and extends lesson-scoped retention.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresentationLessonInput' }
      responses:
        '200': { description: Slide sequence appended to the lesson }
        '404': { description: Source or lesson not found }
        '409': { description: Conversion is incomplete or a converted slide is missing }
  /api/v1/media/{mediaId}/replace:
    post:
      operationId: replaceMedia
      description: Archives the current local original as a restorable version, installs a replacement behind the stable media ID, and invalidates affected lesson manifests.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200': { description: Replacement installed and old original archived }
        '400': { description: Invalid, unsupported, or identical replacement }
        '409': { description: Current media is missing or processing }
        '507': { description: Storage allocation is insufficient }
  /api/v1/media/{mediaId}/versions/{versionId}/file:
    get:
      operationId: downloadMediaVersion
      parameters:
        - { name: mediaId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Archived original file }
        '404': { description: Version or local file not found }
  /api/v1/media/{mediaId}/versions/{versionId}/restore:
    post:
      operationId: restoreMediaVersion
      description: Restores an archived original as a new current version while preserving the current original in history.
      parameters:
        - { name: mediaId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Archived file restored as a new version }
        '404': { description: Media version not found }
        '409': { description: A required local file is missing }
        '507': { description: Storage allocation is insufficient }
  /api/v1/media/bulk:
    post:
      operationId: updateMediaInBulk
      description: Applies naming, organization, deletion, or an explicit retention policy to as many as 500 selected media items. Deletion safely detaches media from lessons and signage before removing current and archived local files.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaBulkInput' }
      responses:
        '200':
          description: Bulk action completed
          content:
            application/json:
              schema:
                type: object
                required: [updated, action]
                properties:
                  updated: { type: integer, minimum: 1, maximum: 500 }
                  action: { enum: [delete, expire, keep, organize, prefix-name] }
        '400': { description: Empty selection, invalid action, invalid prefix, missing date, or date in the past }
        '404': { description: A selected media item no longer exists }
  /api/v1/storage:
    get:
      operationId: getStorageStatus
      description: Requires settings.manage. Returns current LessonCue usage, computer free space, allocation, and remaining upload capacity. Upload-capable users receive a capacity summary through bootstrap and the Media Library.
      responses:
        '200':
          description: Storage status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StorageStatus' }
    put:
      operationId: setStorageAllocation
      description: Requires settings.manage. Zero enables automatic safe allocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limitBytes]
              properties:
                limitBytes: { type: integer, format: int64, minimum: 0 }
      responses:
        '200': { description: Updated storage status }
        '400': { description: Allocation exceeds safe disk space or is below current usage }
  /api/v1/local-address:
    get:
      operationId: getLocalAddress
      description: Requires settings.manage.
      responses:
        '200':
          description: Requested `.local` hostname and native Linux application status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalAddressStatus' }
    put:
      operationId: setLocalAddress
      description: Requires settings.manage. Applies a single-label mDNS hostname on native Linux.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname: { type: string, pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.local)?$' }
      responses:
        '200':
          description: Saved local address status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalAddressStatus' }
        '400': { description: Invalid hostname }
  /api/v1/http-port:
    get:
      operationId: getHttpPort
      description: Requires settings.manage.
      responses:
        '200':
          description: Configured browser port and application status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HttpPortStatus' }
    put:
      operationId: setHttpPort
      description: Requires settings.manage. Saves the listener port and applies it automatically on native Linux.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [port]
              properties:
                port: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        '200':
          description: Saved HTTP port status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HttpPortStatus' }
        '400': { description: Invalid port }
  /api/v1/cloudflare-tunnel:
    get:
      operationId: getCloudflareTunnel
      description: Requires settings.manage. Returns public configuration and connector health without returning the tunnel credential.
      responses:
        '200':
          description: Optional remote-access status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CloudflareTunnelStatus' }
    put:
      operationId: setCloudflareTunnel
      description: Requires settings.manage. Uses the protected native Linux helper to install, enable, rotate, or remove an outbound Cloudflare Tunnel connector.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CloudflareTunnelInput' }
      responses:
        '202':
          description: Protected tunnel operation requested
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CloudflareTunnelStatus' }
        '400': { description: Unsupported host, invalid public hostname or token, missing exposure acknowledgement, or missing initial credential }
  /api/v1/updates:
    get:
      operationId: getUpdateStatus
      description: Requires updates.manage. All signed-in users still receive the daily update-available alert through bootstrap.
      responses:
        '200':
          description: Installed and latest release status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateStatus' }
  /api/v1/updates/check:
    post:
      operationId: checkForUpdate
      description: Requires updates.manage.
      responses:
        '200': { description: Refreshed update status }
  /api/v1/updates/install:
    post:
      operationId: installUpdate
      description: Requires updates.manage. Starts the protected native Linux updater.
      responses:
        '202': { description: Update installation started }
        '409': { description: No update is available or automatic installation is not configured }
  /api/v1/pairing/status:
    get:
      operationId: getPairingStatus
      description: Requires settings.manage.
      responses:
        '200':
          description: Current local pairing PIN and mode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingStatus' }
  /api/v1/pairing/pin:
    put:
      operationId: setPairingPin
      description: Requires settings.manage. Set a fixed local six-digit PIN or restore automatic rotation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pin: { type: [string, 'null'], pattern: '^[0-9]{6}$' }
                automatic: { type: boolean, default: false }
      responses:
        '200':
          description: Updated pairing status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingStatus' }
        '400': { description: The fixed PIN is not exactly six digits }
  /api/v1/controller-pin:
    put:
      operationId: setUniversalControllerPin
      description: Requires settings.manage. Hashes and replaces the six-digit universal-controller PIN.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ControllerPinInput' }
      responses:
        '204': { description: PIN replaced }
        '400': { description: PIN is not exactly six digits }
  /api/v1/recycle-bin:
    get:
      operationId: listRecycleBin
      description: Requires settings.manage. Lists deleted classes, lessons, and media retained for administrator recovery.
      responses:
        '200':
          description: Recycled items ordered by deletion time
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/RecycleBinItem' }
    delete:
      operationId: purgeRecycleBin
      description: Requires settings.manage. Permanently removes all recycled records and stored media files.
      responses:
        '200': { description: Number of permanently purged items }
  /api/v1/recycle-bin/{kind}/{id}/restore:
    post:
      operationId: restoreRecycleBinItem
      description: Requires settings.manage. Restores one class, lesson, or media item; restoring a class also restores lessons recycled with it.
      parameters:
        - name: kind
          in: path
          required: true
          schema: { enum: [class, lesson, media] }
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Item restored }
        '409': { description: A lesson's class must be restored first }
  /api/v1/users:
    get:
      operationId: listUsers
      description: Requires users.manage. Lists local accounts with their effective and optional custom permissions.
      responses:
        '200':
          description: Local user accounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      operationId: createUser
      description: Requires users.manage. Only an owner can create another owner.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201': { description: User created }
        '400': { description: Invalid username, name, or password }
        '409': { description: Username already exists }
  /api/v1/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: updateUser
      description: Requires users.manage. Updates identity, role, granular permissions, status, and optionally the password. Security changes invalidate earlier sessions. Only an owner can alter an owner account or grant the owner role.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '204': { description: User updated }
        '400': { description: Invalid update, self-pause, or final active owner protection }
        '404': { description: User not found }
        '409': { description: Username already exists }
    delete:
      operationId: deleteUser
      description: Requires users.manage. Self-deletion and deletion of the final active owner are rejected; only an owner can delete an owner.
      responses:
        '204': { description: User deleted }
        '400': { description: Self-deletion or final active owner protection }
        '404': { description: User not found }
  /api/v1/users/invitations:
    post:
      operationId: inviteUser
      description: Requires users.manage and configured account email. Reserves the administrator-selected access and sends a three-day one-time setup link.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInvitationInput' }
      responses:
        '201': { description: Pending account created and setup message accepted }
        '400': { description: Invalid email, name, role, or permissions }
        '409': { description: Email already belongs to an account or email is not configured }
        '502': { description: Account reserved but setup message could not be delivered }
  /api/v1/users/{userId}/invitation:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: resendUserInvitation
      description: Requires users.manage. Invalidates the earlier setup token and sends a new three-day link.
      responses:
        '200': { description: New setup message accepted }
        '404': { description: User not found }
        '409': { description: Account is not pending setup or email is unavailable }
        '502': { description: Provider could not deliver the setup message }
  /api/v1/users/{userId}/approve:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: approveUser
      description: Requires users.manage. Releases an approval-required registration and attempts an email notification.
      responses:
        '200': { description: Account approved }
        '404': { description: User not found }
        '409': { description: Account is not awaiting approval }
  /api/v1/users/{userId}/temporary-password:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      operationId: setTemporaryUserPassword
      description: Requires users.manage. Invalidates prior sessions and forces password replacement before any other authenticated API use.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TemporaryPasswordInput' }
      responses:
        '200': { description: Temporary password set }
        '400': { description: Invalid password or attempt to reset the current account }
        '404': { description: User not found }
        '409': { description: Invited account has not completed setup }
  /api/v1/auth/register:
    post:
      operationId: registerAccount
      description: Creates an unverified Viewer when the administrator-selected registration mode permits it. Closed mode rejects codes as well as uncoded requests.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrationInput' }
      responses:
        '202': { description: Account created and verification message requested }
        '400': { description: Invalid account details or registration code }
        '403': { description: Registration is closed }
        '409': { description: Account already exists or email is unavailable }
        '429': { description: Account request limit reached }
  /api/v1/auth/verify:
    post:
      operationId: verifyAccount
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TokenInput' }
      responses:
        '200': { description: Email verified }
        '400': { description: Token is invalid, used, or expired }
        '429': { description: Account request limit reached }
  /api/v1/auth/verification/resend:
    post:
      operationId: resendAccountVerification
      description: Always returns a generic accepted response to reduce account discovery.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailInput' }
      responses:
        '202': { description: Generic verification response }
        '429': { description: Account request limit reached }
  /api/v1/auth/password/forgot:
    post:
      operationId: requestPasswordRecovery
      description: Always returns a generic accepted response to reduce account discovery.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmailInput' }
      responses:
        '202': { description: Generic recovery response }
        '429': { description: Account request limit reached }
  /api/v1/auth/password/reset:
    post:
      operationId: resetPasswordWithToken
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PasswordResetInput' }
      responses:
        '200': { description: Password changed and prior sessions invalidated }
        '400': { description: Invalid password or token }
        '429': { description: Account request limit reached }
  /api/v1/auth/password/change-required:
    post:
      operationId: changeRequiredPassword
      description: Replaces an administrator-issued temporary password. While the temporary-password flag is active, other authenticated API routes are denied.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RequiredPasswordChangeInput' }
      responses:
        '200': { description: Password changed and authenticated session renewed }
        '400': { description: Temporary password or new password was invalid }
        '401': { description: Sign-in required }
        '409': { description: Password change is not required }
  /api/v1/auth/setup-account:
    post:
      operationId: completeInvitedAccount
      description: Consumes a three-day administrator invitation and lets the recipient choose a display name, username, and password.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccountSetupInput' }
      responses:
        '200': { description: Account setup completed }
        '400': { description: Invalid or expired token, identity, or password }
        '409': { description: Username already exists }
        '429': { description: Account request limit reached }
  /api/v1/auth/profile:
    get:
      operationId: getOwnProfile
      responses:
        '200': { description: Current account profile }
        '401': { description: Sign-in required }
    put:
      operationId: updateOwnProfile
      description: Changing username, email, or password requires the current password. A changed email remains pending until verified.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProfileUpdateInput' }
      responses:
        '200': { description: Profile saved }
        '400': { description: Invalid update or current password }
        '401': { description: Sign-in required }
        '409': { description: Username or email already exists, or email delivery is unavailable }
        '429': { description: Account request limit reached }
  /api/v1/registration/settings:
    get:
      operationId: getRegistrationSettings
      description: Requires settings.manage. Never returns an email API key.
      responses:
        '200': { description: Registration and provider status }
    put:
      operationId: updateRegistrationSettings
      description: Requires settings.manage. The optional API key is write-only and protected in the local data directory.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrationSettingsInput' }
      responses:
        '200': { description: Settings saved }
        '400': { description: Invalid mode, provider, sender, address, or provider configuration }
  /api/v1/registration/email/test:
    post:
      operationId: testAccountEmailDelivery
      description: Requires settings.manage. Sends a real test through the currently saved Resend or Brevo configuration and audits the result.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [recipient]
              properties:
                recipient: { type: string, format: email, maxLength: 200 }
      responses:
        '200': { description: Test message accepted by the configured provider }
        '400': { description: Invalid recipient }
        '409': { description: Email delivery has not been configured }
        '502': { description: Provider rejected or could not deliver the test }
  /api/v1/registration/codes:
    get:
      operationId: listRegistrationCodes
      description: Requires settings.manage. Returns only a short hint, never the full code.
      responses:
        '200': { description: Registration code metadata }
    post:
      operationId: createRegistrationCode
      description: Requires settings.manage. Returns the generated full code once.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrationCodeInput' }
      responses:
        '201': { description: Registration code and hint }
        '400': { description: Invalid expiration or use limit }
  /api/v1/registration/codes/{codeId}:
    parameters:
      - name: codeId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: updateRegistrationCode
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegistrationCodeInput' }
      responses:
        '204': { description: Limits saved }
        '404': { description: Code not found }
    delete:
      operationId: revokeRegistrationCode
      responses:
        '204': { description: Code revoked }
        '404': { description: Code not found }
  /api/v1/registration/codes/{codeId}/rotate:
    post:
      operationId: rotateRegistrationCode
      parameters:
        - name: codeId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Existing code revoked and replacement full code returned once }
        '404': { description: Code not found }
components:
  securitySchemes:
    deviceBearer:
      type: http
      scheme: bearer
  schemas:
    HardwareAccelerationStatus:
      type: object
      required: [supported, available, engine, message]
      properties:
        supported: { type: boolean }
        available: { type: boolean }
        engine: { type: string, example: Intel VAAPI (H.264, i965) }
        message: { type: string }
        lastCheckedAt: { type: [string, 'null'], format: date-time }
        lastHardwareUseAt: { type: [string, 'null'], format: date-time }
        lastFallbackAt: { type: [string, 'null'], format: date-time }
        lastError: { type: [string, 'null'] }
    RegistrationInput:
      type: object
      required: [username, displayName, email, password]
      properties:
        username: { type: string, minLength: 3, maxLength: 80 }
        displayName: { type: string, minLength: 1, maxLength: 120 }
        email: { type: string, format: email, maxLength: 200 }
        password: { type: string, minLength: 10, writeOnly: true }
        code: { type: [string, 'null'], writeOnly: true }
    TokenInput:
      type: object
      required: [token]
      properties:
        token: { type: string, minLength: 64, maxLength: 64, writeOnly: true }
    EmailInput:
      type: object
      required: [email]
      properties:
        email: { type: string, format: email, maxLength: 200 }
    PasswordResetInput:
      type: object
      required: [token, password]
      properties:
        token: { type: string, minLength: 64, maxLength: 64, writeOnly: true }
        password: { type: string, minLength: 10, writeOnly: true }
    ProfileUpdateInput:
      type: object
      required: [displayName, username, email]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 120 }
        username: { type: string, minLength: 3, maxLength: 80 }
        email: { type: string, format: email, maxLength: 200, description: May be empty for a local-only account. }
        currentPassword: { type: [string, 'null'], writeOnly: true }
        newPassword: { type: [string, 'null'], minLength: 10, writeOnly: true }
    RegistrationSettingsInput:
      type: object
      required: [mode, publicBaseUrl, emailProvider, emailFromAddress, emailFromName]
      properties:
        mode: { enum: [closed, approval, code, open] }
        publicBaseUrl: { type: string, maxLength: 253, description: Must be HTTPS except for loopback development. }
        emailProvider: { enum: [none, resend, brevo] }
        emailFromAddress: { type: string, format: email, maxLength: 200 }
        emailFromName: { type: string, maxLength: 120 }
        apiKey: { type: [string, 'null'], writeOnly: true }
    RegistrationCodeInput:
      type: object
      required: [label]
      properties:
        label: { type: string, maxLength: 120 }
        expiresAt: { type: [string, 'null'], format: date-time }
        maxUses: { type: [integer, 'null'], minimum: 1, maximum: 100000 }
    BackupPreview:
      type: object
      required: [restoreId, fileName, kind, compressedBytes, uncompressedBytes, fileCount, organization, users, classes, lessons, mediaRecords, mediaFiles, includesMedia, warnings, expiresAt]
      properties:
        restoreId: { type: string, format: uuid }
        fileName: { type: string }
        kind: { enum: [configuration, full] }
        compressedBytes: { type: integer, format: int64, minimum: 1 }
        uncompressedBytes: { type: integer, format: int64, minimum: 1 }
        fileCount: { type: integer, minimum: 1 }
        organization: { type: string }
        users: { type: integer, minimum: 0 }
        classes: { type: integer, minimum: 0 }
        lessons: { type: integer, minimum: 0 }
        mediaRecords: { type: integer, minimum: 0 }
        mediaFiles: { type: integer, minimum: 0 }
        includesMedia: { type: boolean }
        warnings: { type: array, items: { type: string } }
        expiresAt: { type: string, format: date-time }
    BackupRestoreResult:
      type: object
      required: [safetyBackupId, safetyBackupFileName, kind, organization, mediaRestored, preservedServerSettings]
      properties:
        safetyBackupId: { type: string, format: uuid }
        safetyBackupFileName: { type: string }
