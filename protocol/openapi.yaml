openapi: 3.1.0
info:
  title: LessonCue Local API
  version: 2.6.0
  description: Versioned contract used by the LessonCue administration UI and native TV clients.
servers:
  - url: http://lessoncue.local
paths:
  /.well-known/lessoncue:
    get:
      operationId: discoverServer
      responses:
        '200':
          description: Public local-network discovery document
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Discovery' }
  /api/v1/pairing/request:
    post:
      operationId: requestPairing
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PairingRequest' }
      responses:
        '202':
          description: Pairing request is waiting for PIN confirmation
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId: { type: string, format: uuid }
                  expiresAt: { type: string, format: date-time }
  /api/v1/pairing/confirm:
    post:
      operationId: confirmPairing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [requestId, pin]
              properties:
                requestId: { type: string, format: uuid }
                pin: { type: string, pattern: '^[0-9]{6}$' }
      responses:
        '200':
          description: Device credential and initial identity
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingResult' }
        '400': { description: Expired or invalid PIN }
        '429': { description: Too many attempts }
  /api/v1/classes:
    get:
      operationId: listClasses
      responses:
        '200':
          description: Classes
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Class' }
    post:
      operationId: createClass
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ClassInput' }
      responses:
        '201': { description: Created }
  /api/v1/lessons:
    get:
      operationId: listLessons
      responses:
        '200':
          description: Lessons ordered by date
    post:
      operationId: createLesson
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonInput' }
      responses:
        '201': { description: Created }
  /api/v1/lessons/{lessonId}/items:
    post:
      operationId: addPlaylistItem
      parameters:
        - name: lessonId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaylistItemInput' }
      responses:
        '201': { description: Created and manifest invalidated }
        '404': { description: Lesson not found }
  /api/v1/lesson-templates:
    get:
      operationId: listLessonTemplates
      responses:
        '200':
          description: Reusable lesson structures with ordered cue snapshots and schedule counts
          content:
            application/json:
              schema: { type: array, items: { $ref: '#/components/schemas/LessonTemplate' } }
  /api/v1/lesson-templates/from-lesson:
    post:
      operationId: createLessonTemplateFromLesson
      description: Captures playlist, timing, pre-roll, countdown, offline, trim, fade, cue, and media settings. Referenced lesson-scoped media becomes permanent.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateFromLessonInput' }
      responses:
        '201': { description: Template created }
        '404': { description: Source lesson not found }
  /api/v1/lesson-templates/{templateId}:
    put:
      operationId: updateLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateUpdateInput' }
      responses:
        '200': { description: Template defaults updated }
        '404': { description: Template not found }
    delete:
      operationId: deleteLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Template and its schedules deleted; generated lessons preserved }
  /api/v1/lesson-templates/{templateId}/replace-from-lesson:
    post:
      operationId: replaceLessonTemplateStructure
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [lessonId]
              properties:
                lessonId: { type: string, format: uuid }
      responses:
        '200': { description: Playlist and timing structure replaced while template identity and schedules remain }
        '404': { description: Template or lesson not found }
  /api/v1/lesson-templates/{templateId}/instantiate:
    post:
      operationId: instantiateLessonTemplate
      parameters:
        - { name: templateId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LessonTemplateInstantiateInput' }
      responses:
        '201': { description: One dated lesson created from the template }
        '404': { description: Template or class not found }
  /api/v1/recurring-schedules:
    get:
      operationId: listRecurringLessonSchedules
      responses:
        '200': { description: Recurring schedules with generated counts and explicit exception dates }
    post:
      operationId: createRecurringLessonSchedule
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringScheduleInput' }
      responses:
        '201': { description: Schedule created and enabled occurrences generated idempotently }
        '400': { description: Invalid recurrence, template, or class }
  /api/v1/recurring-schedules/{scheduleId}:
    put:
      operationId: updateRecurringLessonSchedule
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RecurringScheduleInput' }
      responses:
        '200': { description: Schedule updated and missing enabled occurrences generated }
    delete:
      operationId: deleteRecurringLessonSchedule
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: Schedule deleted; generated lessons preserved }
  /api/v1/recurring-schedules/{scheduleId}/generate:
    post:
      operationId: generateRecurringLessons
      description: Materializes missing occurrences only; rerunning never duplicates a schedule date.
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                throughDate: { type: [string, 'null'], format: date }
      responses:
        '200': { description: Number of newly generated lessons }
  /api/v1/recurring-schedules/{scheduleId}/exception:
    post:
      operationId: setRecurringScheduleException
      description: Excluding a date removes that schedule's generated lesson; restoring it regenerates the missing occurrence.
      parameters:
        - { name: scheduleId, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [date, excluded]
              properties:
                date: { type: string, format: date }
                excluded: { type: boolean }
      responses:
        '200': { description: Exception list and occurrence updated }
  /api/v1/playlist-items/{itemId}:
    patch:
      operationId: updatePlaylistItem
      parameters:
        - name: itemId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PlaylistItemUpdateInput' }
      responses:
        '200': { description: Updated and manifest invalidated }
        '400': { description: Invalid trim, fade, or cue marker }
        '404': { description: Playlist item not found }
  /api/v1/screens/{screenId}/manifest:
    get:
      operationId: getScreenManifest
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Complete offline synchronization manifest
          content:
            application/json:
              schema: { $ref: './manifest.schema.json' }
  /api/v1/screens/{screenId}/control:
    get:
      operationId: getScreenControlCommand
      description: Device-authenticated command cursor. Omit `after` at startup to establish a baseline without replaying an old command, then poll with the last version.
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: after
          in: query
          required: false
          schema: { type: integer, minimum: 0 }
      responses:
        '200':
          description: Latest command and whether it is newer than the supplied cursor
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScreenControlCommand' }
        '401': { description: Device credential is invalid or revoked }
    post:
      operationId: sendScreenControlCommand
      description: Sends an ordered playback command from an authenticated local browser controller.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScreenControlInput' }
      responses:
        '202': { description: Command saved for the screen }
        '400': { description: Invalid command, lesson, or playlist item }
        '404': { description: Screen not found }
  /api/v1/tv/status:
    post:
      operationId: reportTvStatus
      security: [{ deviceBearer: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TvStatus' }
      responses:
        '202': { description: Accepted }
  /api/v1/screens/{screenId}/diagnostics/screenshot-request:
    post:
      operationId: requestScreenDiagnosticScreenshot
      description: Requires screens.manage. Creates a one-time request only when the screen-specific privacy opt-in is enabled and the player is online.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: One-time 60-second request created }
        '409': { description: 'Screenshot access is disabled or the player is offline' }
  /api/v1/screens/{screenId}/diagnostics/screenshot:
    get:
      operationId: getScreenDiagnosticScreenshot
      description: Requires screens.manage. Returns the latest unexpired screenshot for this screen.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Latest diagnostic image
          content:
            image/jpeg: { schema: { type: string, format: binary } }
            image/png: { schema: { type: string, format: binary } }
        '404': { description: No unexpired screenshot }
    delete:
      operationId: deleteScreenDiagnosticScreenshot
      description: Requires screens.manage. Immediately deletes the stored diagnostic image and request metadata.
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204': { description: Screenshot deleted }
  /api/v1/tv/screens/{screenId}/diagnostics/screenshot/{requestId}:
    put:
      operationId: uploadTvDiagnosticScreenshot
      description: Fulfills an administrator-enabled, one-time request that expires after 60 seconds. The player displays a visible capture notice; the server retains only the latest image for 24 hours.
      security: [{ deviceBearer: [] }]
      parameters:
        - name: screenId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: requestId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          image/jpeg: { schema: { type: string, format: binary, maxLength: 8388608 } }
          image/png: { schema: { type: string, format: binary, maxLength: 8388608 } }
      responses:
        '202': { description: Screenshot accepted }
        '400': { description: Invalid or oversized image }
        '409': { description: 'Request is disabled, expired, or already fulfilled' }
  /api/v1/media/{mediaId}/file:
    get:
      operationId: downloadMedia
      description: Range-enabled media on the trusted local television network. Device manifests remain bearer-authenticated.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Media file }
        '206': { description: Partial media response }
        '404': { description: Not found }
  /api/v1/media/{mediaId}/playback:
    get:
      operationId: streamCompatibleMedia
      description: Streams the original when it meets the shared TV codec policy, otherwise the locally generated H.264/AAC MP4 derivative. Supports byte ranges and strong ETags.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: TV-compatible playback media }
        '206': { description: Partial playback media range }
        '404': { description: Media or compatible file not found }
  /api/v1/backups/restore/preview:
    post:
      operationId: previewBackupRestore
      description: Stages and validates a LessonCue ZIP without changing current data.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200':
          description: Validated restore preview
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupPreview' }
        '400': { description: Invalid, unsafe, corrupt, or oversized backup }
  /api/v1/backups/restore:
    post:
      operationId: restoreBackup
      description: Revalidates the staged archive, creates a full safety backup, then restores database and optional media while preserving server-local identity and connection settings.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [restoreId, confirmation]
              properties:
                restoreId: { type: string, format: uuid }
                confirmation: { type: string, const: RESTORE }
      responses:
        '200':
          description: Restore completed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BackupRestoreResult' }
        '400': { description: Invalid confirmation or expired staged backup }
        '409': { description: Another restore is running }
  /api/v1/media/{mediaId}/filmstrip:
    get:
      operationId: getMediaFilmstrip
      description: Locally generated six-frame JPEG used by the visual timeline editor.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Filmstrip JPEG }
        '404': { description: Derivative is not available }
  /api/v1/media/{mediaId}/waveform:
    get:
      operationId: getMediaWaveform
      description: Locally generated PNG waveform used by the visual timeline editor.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200': { description: Waveform PNG }
        '404': { description: Derivative is not available }
  /api/v1/media/{mediaId}/impact:
    get:
      operationId: getMediaImpact
      description: Lists every lesson cue and sign that currently uses the media, plus locally archived versions.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Media usage and version history
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MediaImpact' }
        '404': { description: Media not found }
  /api/v1/media/{mediaId}/organize:
    patch:
      operationId: organizeMedia
      description: Renames a media item and assigns its local folder and tags without changing lesson references.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaOrganizeInput' }
      responses:
        '200': { description: Media organized }
        '400': { description: Invalid display name }
        '404': { description: Media not found }
  /api/v1/media/{mediaId}/reprocess:
    post:
      operationId: reprocessMedia
      description: Clears derived metadata and queues local FFprobe/FFmpeg processing again without replacing the original.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Reprocessing queued }
        '400': { description: Media has no local file }
        '409': { description: Media is already processing }
  /api/v1/media/{mediaId}/convert:
    post:
      operationId: convertPresentation
      description: Queues a fully local LibreOffice/Poppler conversion of a PDF, PPTX, ODP, or DOCX into screen-ready PNG media assets.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '202': { description: Conversion queued }
        '400': { description: Unsupported or online-only source }
        '409': { description: Conversion already queued or running }
  /api/v1/media/{mediaId}/conversion/add-to-lesson:
    post:
      operationId: addConvertedSlidesToLesson
      description: Adds the latest converted slide assets to a lesson in page order and extends lesson-scoped retention.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PresentationLessonInput' }
      responses:
        '200': { description: Slide sequence appended to the lesson }
        '404': { description: Source or lesson not found }
        '409': { description: Conversion is incomplete or a converted slide is missing }
  /api/v1/media/{mediaId}/replace:
    post:
      operationId: replaceMedia
      description: Archives the current local original as a restorable version, installs a replacement behind the stable media ID, and invalidates affected lesson manifests.
      parameters:
        - name: mediaId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '200': { description: Replacement installed and old original archived }
        '400': { description: Invalid, unsupported, or identical replacement }
        '409': { description: Current media is missing or processing }
        '507': { description: Storage allocation is insufficient }
  /api/v1/media/{mediaId}/versions/{versionId}/file:
    get:
      operationId: downloadMediaVersion
      parameters:
        - { name: mediaId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Archived original file }
        '404': { description: Version or local file not found }
  /api/v1/media/{mediaId}/versions/{versionId}/restore:
    post:
      operationId: restoreMediaVersion
      description: Restores an archived original as a new current version while preserving the current original in history.
      parameters:
        - { name: mediaId, in: path, required: true, schema: { type: string, format: uuid } }
        - { name: versionId, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Archived file restored as a new version }
        '404': { description: Media version not found }
        '409': { description: A required local file is missing }
        '507': { description: Storage allocation is insufficient }
  /api/v1/media/bulk:
    post:
      operationId: updateMediaInBulk
      description: Applies organization, deletion, or an explicit retention policy to as many as 500 selected media items. Deletion safely detaches media from lessons and signage before removing current and archived local files.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/MediaBulkInput' }
      responses:
        '200':
          description: Bulk action completed
          content:
            application/json:
              schema:
                type: object
                required: [updated, action]
                properties:
                  updated: { type: integer, minimum: 1, maximum: 500 }
                  action: { enum: [delete, expire, keep, organize] }
        '400': { description: Empty selection, invalid action, missing date, or date in the past }
        '404': { description: A selected media item no longer exists }
  /api/v1/storage:
    get:
      operationId: getStorageStatus
      description: Requires settings.manage. Returns current LessonCue usage, computer free space, allocation, and remaining upload capacity. Upload-capable users receive a capacity summary through bootstrap and the Media Library.
      responses:
        '200':
          description: Storage status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/StorageStatus' }
    put:
      operationId: setStorageAllocation
      description: Requires settings.manage. Zero enables automatic safe allocation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [limitBytes]
              properties:
                limitBytes: { type: integer, format: int64, minimum: 0 }
      responses:
        '200': { description: Updated storage status }
        '400': { description: Allocation exceeds safe disk space or is below current usage }
  /api/v1/local-address:
    get:
      operationId: getLocalAddress
      description: Requires settings.manage.
      responses:
        '200':
          description: Requested `.local` hostname and native Linux application status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalAddressStatus' }
    put:
      operationId: setLocalAddress
      description: Requires settings.manage. Applies a single-label mDNS hostname on native Linux.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [hostname]
              properties:
                hostname: { type: string, pattern: '^[a-z0-9]([a-z0-9-]{0,61}[a-z0-9])?(\.local)?$' }
      responses:
        '200':
          description: Saved local address status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocalAddressStatus' }
        '400': { description: Invalid hostname }
  /api/v1/http-port:
    get:
      operationId: getHttpPort
      description: Requires settings.manage.
      responses:
        '200':
          description: Configured browser port and application status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HttpPortStatus' }
    put:
      operationId: setHttpPort
      description: Requires settings.manage. Saves the listener port and applies it automatically on native Linux.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [port]
              properties:
                port: { type: integer, minimum: 1, maximum: 65535 }
      responses:
        '200':
          description: Saved HTTP port status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/HttpPortStatus' }
        '400': { description: Invalid port }
  /api/v1/updates:
    get:
      operationId: getUpdateStatus
      description: Requires updates.manage. All signed-in users still receive the daily update-available alert through bootstrap.
      responses:
        '200':
          description: Installed and latest release status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UpdateStatus' }
  /api/v1/updates/check:
    post:
      operationId: checkForUpdate
      description: Requires updates.manage.
      responses:
        '200': { description: Refreshed update status }
  /api/v1/updates/install:
    post:
      operationId: installUpdate
      description: Requires updates.manage. Starts the protected native Linux updater.
      responses:
        '202': { description: Update installation started }
        '409': { description: No update is available or automatic installation is not configured }
  /api/v1/pairing/status:
    get:
      operationId: getPairingStatus
      description: Requires settings.manage.
      responses:
        '200':
          description: Current local pairing PIN and mode
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingStatus' }
  /api/v1/pairing/pin:
    put:
      operationId: setPairingPin
      description: Requires settings.manage. Set a fixed local six-digit PIN or restore automatic rotation.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                pin: { type: [string, 'null'], pattern: '^[0-9]{6}$' }
                automatic: { type: boolean, default: false }
      responses:
        '200':
          description: Updated pairing status
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PairingStatus' }
        '400': { description: The fixed PIN is not exactly six digits }
  /api/v1/users:
    get:
      operationId: listUsers
      description: Requires users.manage. Lists local accounts with their effective and optional custom permissions.
      responses:
        '200':
          description: Local user accounts
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/User' }
    post:
      operationId: createUser
      description: Requires users.manage. Only an owner can create another owner.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '201': { description: User created }
        '400': { description: Invalid username, name, or password }
        '409': { description: Username already exists }
  /api/v1/users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema: { type: string, format: uuid }
    put:
      operationId: updateUser
      description: Requires users.manage. Updates identity, role, granular permissions, status, and optionally the password. Security changes invalidate earlier sessions. Only an owner can alter an owner account or grant the owner role.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserInput' }
      responses:
        '204': { description: User updated }
        '400': { description: Invalid update, self-pause, or final active owner protection }
        '404': { description: User not found }
        '409': { description: Username already exists }
    delete:
      operationId: deleteUser
      description: Requires users.manage. Self-deletion and deletion of the final active owner are rejected; only an owner can delete an owner.
      responses:
        '204': { description: User deleted }
        '400': { description: Self-deletion or final active owner protection }
        '404': { description: User not found }
components:
  securitySchemes:
    deviceBearer:
      type: http
      scheme: bearer
  schemas:
    BackupPreview:
      type: object
      required: [restoreId, fileName, kind, compressedBytes, uncompressedBytes, fileCount, organization, users, classes, lessons, mediaRecords, mediaFiles, includesMedia, warnings, expiresAt]
      properties:
        restoreId: { type: string, format: uuid }
        fileName: { type: string }
        kind: { enum: [configuration, full] }
        compressedBytes: { type: integer, format: int64, minimum: 1 }
        uncompressedBytes: { type: integer, format: int64, minimum: 1 }
        fileCount: { type: integer, minimum: 1 }
        organization: { type: string }
        users: { type: integer, minimum: 0 }
        classes: { type: integer, minimum: 0 }
        lessons: { type: integer, minimum: 0 }
        mediaRecords: { type: integer, minimum: 0 }
        mediaFiles: { type: integer, minimum: 0 }
        includesMedia: { type: boolean }
        warnings: { type: array, items: { type: string } }
        expiresAt: { type: string, format: date-time }
    BackupRestoreResult:
      type: object
      required: [safetyBackupId, safetyBackupFileName, kind, organization, mediaRestored, preservedServerSettings]
      properties:
        safetyBackupId: { type: string, format: uuid }
        safetyBackupFileName: { type: string }
        kind: { enum: [configuration, full] }
        organization: { type: string }
        mediaRestored: { type: boolean }
        preservedServerSettings: { type: array, items: { type: string } }
    Discovery:
      type: object
      required: [product, serverId, serverName, localAddress, apiVersion, pairingEnabled]
      properties:
        product: { const: LessonCue }
        serverId: { type: string, format: uuid }
        serverName: { type: string }
        localAddress: { type: string, format: uri }
        apiVersion: { const: 1 }
        pairingEnabled: { type: boolean }
    StorageStatus:
      type: object
      required: [usedBytes, diskAvailableBytes, maximumAllocationBytes, allocationBytes, remainingBytes, automaticAllocation]
      properties:
        usedBytes: { type: integer, format: int64 }
        diskAvailableBytes: { type: integer, format: int64 }
        maximumAllocationBytes: { type: integer, format: int64 }
        allocationBytes: { type: integer, format: int64 }
        remainingBytes: { type: integer, format: int64 }
        automaticAllocation: { type: boolean }
    MediaOrganizeInput:
      type: object
      properties:
        fileName: { type: [string, 'null'], minLength: 1, maxLength: 255 }
        folder: { type: [string, 'null'], maxLength: 120 }
        tagsCsv: { type: [string, 'null'], maxLength: 500 }
    PresentationLessonInput:
      type: object
      required: [lessonId]
      properties:
        lessonId: { type: string, format: uuid }
        imageDurationSeconds: { type: integer, minimum: 1, maximum: 3600, default: 10 }
    MediaImpact:
      type: object
      required: [id, fileName, folder, tagsCsv, version, lessons, templates, signage, versions]
      properties:
        id: { type: string, format: uuid }
        fileName: { type: string }
        folder: { type: string }
        tagsCsv: { type: string }
        version: { type: integer, minimum: 1 }
        replacedAt: { type: [string, 'null'], format: date-time }
        lessons: { type: array, items: { type: object } }
        templates: { type: array, items: { type: object } }
        signage: { type: array, items: { type: object } }
        versions:
          type: array
          items:
            type: object
            required: [id, versionNumber, fileName, sizeBytes, archivedAt, archivedBy, downloadUrl]
            properties:
              id: { type: string, format: uuid }
              versionNumber: { type: integer, minimum: 1 }
              fileName: { type: string }
              sizeBytes: { type: integer, format: int64, minimum: 0 }
              archivedAt: { type: string, format: date-time }
              archivedBy: { type: string }
              downloadUrl: { type: string }
    MediaBulkInput:
      type: object
      required: [mediaIds, action]
      properties:
        mediaIds:
          type: array
          minItems: 1
          maxItems: 500
          uniqueItems: true
          items: { type: string, format: uuid }
        action: { enum: [delete, expire, keep, organize] }
        deleteOn:
          type: [string, 'null']
          format: date
          description: Required when action is expire. Media remains available through the end of this date.
        folder: { type: [string, 'null'], maxLength: 120, description: Applied when action is organize. }
        tagsCsv: { type: [string, 'null'], maxLength: 500, description: Applied when action is organize. }
    UpdateStatus:
      type: object
      required: [currentVersion, updateAvailable, automaticInstallSupported, installing]
      properties:
        currentVersion: { type: string }
        latestVersion: { type: [string, 'null'] }
        updateAvailable: { type: boolean }
        lastCheckedAt: { type: [string, 'null'], format: date-time }
        releaseUrl: { type: [string, 'null'], format: uri }
        error: { type: [string, 'null'] }
        automaticInstallSupported: { type: boolean }
        installing: { type: boolean }
    LocalAddressStatus:
      type: object
      required: [hostname, address, supported, pending]
      properties:
        hostname: { type: string }
        address: { type: string, format: uri }
        supported: { type: boolean }
        pending: { type: boolean }
        appliedAt: { type: [string, 'null'], format: date-time }
        error: { type: [string, 'null'] }
    HttpPortStatus:
      type: object
      required: [port, address, configurable, supported, pending]
      properties:
        port: { type: integer, minimum: 1, maximum: 65535 }
        address: { type: string, format: uri }
        configurable: { type: boolean }
        supported: { type: boolean }
        pending: { type: boolean }
        appliedAt: { type: [string, 'null'], format: date-time }
        error: { type: [string, 'null'] }
    PairingRequest:
      type: object
      required: [deviceName, platform, appVersion]
      properties:
        deviceName: { type: string, maxLength: 100 }
        platform: { enum: [android-tv, fire-tv, tvos] }
        appVersion: { type: string }
        devicePublicKey: { type: [string, 'null'] }
    PairingResult:
      type: object
      required: [screenId, deviceToken, apiVersion]
      properties:
        screenId: { type: string, format: uuid }
        deviceToken: { type: string }
        apiVersion: { const: 1 }
        serverPublicKey: { type: [string, 'null'] }
    PairingStatus:
      type: object
      required: [pin, expiresAt, fixedPin]
      properties:
        pin: { type: string, pattern: '^[0-9]{6}$' }
        expiresAt: { type: string, format: date-time }
        fixedPin: { type: boolean }
    User:
      type: object
      required: [id, username, displayName, role, permissions, disabled, createdAt]
      properties:
        id: { type: string, format: uuid }
        username: { type: string, minLength: 3, maxLength: 80 }
        displayName: { type: string, minLength: 1 }
        email: { type: [string, 'null'], format: email }
        role: { enum: [Viewer, Editor, Administrator, Owner] }
        permissions:
          type: array
          items: { $ref: '#/components/schemas/Permission' }
          uniqueItems: true
          description: Effective capabilities after applying role defaults or the custom override.
        customPermissions:
          type: [array, 'null']
          items: { $ref: '#/components/schemas/Permission' }
          uniqueItems: true
          description: Null uses role defaults; an empty array intentionally grants no management capabilities.
        disabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        lastLoginAt: { type: [string, 'null'], format: date-time }
    UserInput:
      type: object
      required: [username, displayName, role, disabled]
      properties:
        username: { type: string, minLength: 3, maxLength: 80 }
        displayName: { type: string, minLength: 1 }
        email: { type: [string, 'null'], format: email }
        role: { enum: [Viewer, Editor, Administrator, Owner] }
        permissions:
          type: [array, 'null']
          items: { $ref: '#/components/schemas/Permission' }
          uniqueItems: true
          description: Null uses role defaults; an empty array intentionally grants no management capabilities. Owners always retain every capability.
        password:
          type: [string, 'null']
          minLength: 10
          description: Required when creating an account; omit or send null during updates to retain the current password.
        disabled: { type: boolean, default: false }
    Permission:
      enum: [planning.manage, uploads.manage, playback.control, screens.manage, users.manage, settings.manage, backups.manage, updates.manage]
    Class:
      allOf:
        - $ref: '#/components/schemas/ClassInput'
        - type: object
          required: [id]
          properties:
            id: { type: string, format: uuid }
    ClassInput:
      type: object
      required: [name]
      properties:
        name: { type: string, minLength: 1, maxLength: 120 }
        description: { type: string, maxLength: 1000 }
    LessonInput:
      type: object
      required: [classId, date, title]
      properties:
        classId: { type: string, format: uuid }
        date: { type: string, format: date }
        title: { type: string }
        designatedStartAt: { type: [string, 'null'], format: date-time }
        preRollStartsAt: { type: [string, 'null'], format: date-time }
        availableFrom: { type: [string, 'null'], format: date-time }
        expiresAt: { type: [string, 'null'], format: date-time }
        countdownItemId: { type: [string, 'null'], format: uuid }
        preRollEnabled: { type: boolean, default: false }
    LessonTemplateFromLessonInput:
      type: object
      required: [lessonId, name]
      properties:
        lessonId: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 160 }
        description: { type: [string, 'null'], maxLength: 1000 }
    LessonTemplateUpdateInput:
      type: object
      required: [name, preRollEnabled, keepOffline, downloadDaysBefore]
      properties:
        name: { type: string, minLength: 1, maxLength: 160 }
        description: { type: [string, 'null'], maxLength: 1000 }
        defaultTitle: { type: [string, 'null'], maxLength: 160 }
        defaultStartMinutes: { type: [integer, 'null'], minimum: 0, maximum: 1439 }
        preRollLeadMinutes: { type: [integer, 'null'], minimum: 0, maximum: 1440 }
        preRollEnabled: { type: boolean }
        keepOffline: { type: boolean }
        downloadDaysBefore: { type: integer, minimum: 0, maximum: 365 }
    LessonTemplateInstantiateInput:
      type: object
      required: [classId, date]
      properties:
        classId: { type: string, format: uuid }
        date: { type: string, format: date }
        title: { type: [string, 'null'], maxLength: 160 }
        startMinutes: { type: [integer, 'null'], minimum: 0, maximum: 1439 }
    LessonTemplate:
      type: object
      required: [id, name, description, defaultTitle, preRollEnabled, keepOffline, downloadDaysBefore, scheduleCount, items]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        description: { type: string }
        defaultTitle: { type: string }
        defaultStartMinutes: { type: [integer, 'null'], minimum: 0, maximum: 1439 }
        preRollLeadMinutes: { type: [integer, 'null'], minimum: 0 }
        availableLeadMinutes: { type: [integer, 'null'], minimum: 0 }
        expiresAfterMinutes: { type: [integer, 'null'], minimum: 0 }
        preRollEnabled: { type: boolean }
        keepOffline: { type: boolean }
        downloadDaysBefore: { type: integer }
        scheduleCount: { type: integer, minimum: 0 }
        items: { type: array, items: { type: object } }
    RecurringScheduleInput:
      type: object
      required: [templateId, classId, name, frequency, interval, startDate, enabled, generateDaysAhead]
      properties:
        templateId: { type: string, format: uuid }
        classId: { type: string, format: uuid }
        name: { type: string, minLength: 1, maxLength: 160 }
        frequency: { enum: [weekly, monthly, custom] }
        interval: { type: integer, minimum: 1, maximum: 52 }
        dayOfWeek: { type: [integer, 'null'], minimum: 0, maximum: 6 }
        dayOfMonth: { type: [integer, 'null'], minimum: 1, maximum: 31 }
        startDate: { type: string, format: date }
        endDate: { type: [string, 'null'], format: date }
        startMinutes: { type: [integer, 'null'], minimum: 0, maximum: 1439 }
        titlePattern: { type: [string, 'null'], maxLength: 240, default: '{template} — {date}' }
        customDates:
          type: [array, 'null']
          maxItems: 500
          items: { type: string, format: date }
        excludedDates:
          type: [array, 'null']
          maxItems: 500
          items: { type: string, format: date }
        enabled: { type: boolean, default: true }
        generateDaysAhead: { type: integer, minimum: 1, maximum: 730, default: 90 }
    PlaylistItemInput:
      type: object
      required: [title, type]
      properties:
        title: { type: string }
        type: { enum: [video, audio, image, liveStream, external] }
        mediaId: { type: [string, 'null'], format: uuid }
        role: { enum: [lesson, preRoll, countdown] }
        position: { type: number }
        durationMs: { type: [integer, 'null'] }
        endBehavior: { enum: [advance, pause, loop, menu, stop] }
    PlaylistItemUpdateInput:
      type: object
      properties:
        title: { type: [string, 'null'] }
        startMs: { type: [integer, 'null'], format: int64, minimum: 0 }
        endMs: { type: [integer, 'null'], format: int64, minimum: 0 }
        fadeInMs: { type: [integer, 'null'], minimum: 0, maximum: 30000 }
        fadeOutMs: { type: [integer, 'null'], minimum: 0, maximum: 30000 }
        cuePoints:
          type: array
          maxItems: 50
          items: { $ref: '#/components/schemas/CuePoint' }
    CuePoint:
      type: object
      required: [name, positionMs]
      properties:
        name: { type: string, minLength: 1, maxLength: 80 }
        positionMs: { type: integer, format: int64, minimum: 0 }
    TvStatus:
      type: object
      required: [screenId, appVersion, online, freeBytes, manifestVersion, failedDownloads]
      properties:
        screenId: { type: string, format: uuid }
        appVersion: { type: string }
        online: { type: boolean }
        freeBytes: { type: integer }
        manifestVersion: { type: integer }
        failedDownloads: { type: integer }
        acknowledgedControlVersion: { type: integer, minimum: 0 }
        playbackState: { enum: [idle, loading, buffering, playing, paused, completed, error] }
        lessonId: { type: [string, 'null'], format: uuid }
        itemId: { type: [string, 'null'], format: uuid }
        positionMs: { type: [integer, 'null'], format: int64, minimum: 0 }
        durationMs: { type: [integer, 'null'], format: int64, minimum: 0 }
        volumePercent: { type: [integer, 'null'], minimum: 0, maximum: 150 }
        playbackError: { type: [string, 'null'], maxLength: 1000 }
        cachedItems: { type: [integer, 'null'], minimum: 0 }
        totalItems: { type: [integer, 'null'], minimum: 0 }
        deviceModel: { type: [string, 'null'], maxLength: 160 }
        osVersion: { type: [string, 'null'], maxLength: 80 }
        clientTimeUnixMs: { type: [integer, 'null'], format: int64 }
        networkLatencyMs: { type: [integer, 'null'], minimum: 0, maximum: 120000 }
        networkQuality: { type: [string, 'null'], enum: [excellent, good, fair, poor, offline, null] }
        cacheInventory:
          type: [array, 'null']
          maxItems: 500
          items: { $ref: '#/components/schemas/TvCacheDiagnostic' }
        downloadQueue:
          type: [array, 'null']
          maxItems: 500
          items: { $ref: '#/components/schemas/TvDownloadDiagnostic' }
        codecCapabilities:
          type: [array, 'null']
          maxItems: 100
          items: { $ref: '#/components/schemas/TvCodecCapability' }
        recentErrors:
          type: [array, 'null']
          maxItems: 50
          items: { $ref: '#/components/schemas/TvDiagnosticError' }
    TvCacheDiagnostic:
      type: object
      required: [itemId, title, state, sizeBytes]
      properties:
        itemId: { type: string, maxLength: 80 }
        title: { type: string, maxLength: 160 }
        state: { enum: [cached, queued, downloading, failed, missing, unknown] }
        sizeBytes: { type: integer, format: int64, minimum: 0 }
        expectedBytes: { type: [integer, 'null'], format: int64, minimum: 0 }
        error: { type: [string, 'null'], maxLength: 500 }
    TvDownloadDiagnostic:
      type: object
      required: [itemId, title, state]
      properties:
        itemId: { type: string, maxLength: 80 }
        title: { type: string, maxLength: 160 }
        state: { enum: [queued, downloading, failed, missing] }
        bytesDownloaded: { type: integer, format: int64, minimum: 0 }
        expectedBytes: { type: [integer, 'null'], format: int64, minimum: 0 }
        error: { type: [string, 'null'], maxLength: 500 }
    TvCodecCapability:
      type: object
      required: [kind, codec, supported]
      properties:
        kind: { enum: [video, audio] }
        codec: { type: string, maxLength: 80 }
        supported: { type: boolean }
        detail: { type: [string, 'null'], maxLength: 160 }
    TvDiagnosticError:
      type: object
      required: [timestamp, area, message]
      properties:
        timestamp: { type: string, format: date-time }
        area: { type: string, maxLength: 40 }
        message: { type: string, maxLength: 500 }
        itemId: { type: [string, 'null'], maxLength: 80 }
    ScreenControlInput:
      type: object
      required: [action]
      properties:
        action: { enum: [play, pause, resume, stop, next, previous, seek] }
        lessonId: { type: [string, 'null'], format: uuid }
        itemId: { type: [string, 'null'], format: uuid }
        positionMs: { type: [integer, 'null'], format: int64, minimum: 0 }
    ScreenControlCommand:
      type: object
      required: [changed, version, action, state]
      properties:
        changed: { type: boolean }
        version: { type: integer, minimum: 0 }
        action: { type: string }
        lessonId: { type: [string, 'null'], format: uuid }
        itemId: { type: [string, 'null'], format: uuid }
        positionMs: { type: [integer, 'null'], format: int64, minimum: 0 }
        issuedAt: { type: [string, 'null'], format: date-time }
        state: { enum: [idle, loading, buffering, playing, paused, completed, error] }
        screenshotRequestId: { type: [string, 'null'], format: uuid }
        screenshotExpiresAt: { type: [string, 'null'], format: date-time }
