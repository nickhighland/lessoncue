name: Build all apps

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:admin
      - run: bash -n installers/linux/install-latest.sh installers/linux/install.sh installers/linux/uninstall.sh installers/linux/lessoncue-update
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet restore server/LessonCue.Server.Tests/LessonCue.Server.Tests.csproj
      - run: dotnet test server/LessonCue.Server.Tests/LessonCue.Server.Tests.csproj -c Release --no-restore
      - run: dotnet publish server/LessonCue.Server/LessonCue.Server.csproj -c Release -o artifacts/server
      - uses: actions/upload-artifact@v4
        with:
          name: lessoncue-server-portable
          path: artifacts/server

  browser-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg libreoffice-impress poppler-utils
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:admin
      - run: npm run test:e2e

  android-tv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1
      - run: gradle -p android-tv :app:testDebugUnitTest :app:lintDebug :app:assembleDebug :app:assembleDebugAndroidTest
      - uses: actions/upload-artifact@v4
        with:
          name: LessonCue-AndroidTV-debug
          path: android-tv/app/build/outputs/apk/debug/app-debug.apk

  tvos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: swift build --package-path tvos
      - run: brew install xcodegen
      - run: xcodegen generate
        working-directory: tvos
      - run: >-
          xcodebuild -project tvos/LessonCueTV.xcodeproj -scheme LessonCueTV
          -sdk appletvsimulator -destination 'generic/platform=tvOS Simulator'
          CODE_SIGNING_ALLOWED=NO build

  container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: server/LessonCue.Server/Dockerfile
          push: false
          tags: lessoncue/server:ci
