name: Package release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  server-linux:
    strategy:
      matrix:
        runtime: [linux-x64, linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:admin
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish server/LessonCue.Server/LessonCue.Server.csproj -c Release -r ${{ matrix.runtime }} --self-contained -o package/payload
      - name: Bundle YouTube importer
        run: |
          if [ "${{ matrix.runtime }}" = "linux-arm64" ]; then asset=yt-dlp_linux_aarch64; else asset=yt-dlp_linux; fi
          curl -fL "https://github.com/yt-dlp/yt-dlp/releases/latest/download/${asset}" -o package/payload/yt-dlp
          chmod 0755 package/payload/yt-dlp
      - run: cp installers/linux/install.sh installers/linux/uninstall.sh installers/linux/lessoncue.service installers/linux/lessoncue-cloudflared.service installers/linux/lessoncue-update installers/linux/lessoncue-update.service installers/linux/lessoncue-update.path package/
      - run: mkdir -p package/docker
      - run: cp docker/avahi-service.xml package/docker/
      - run: tar -C package -czf LessonCue-Server-${{ matrix.runtime }}.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: LessonCue-Server-${{ matrix.runtime }}
          path: LessonCue-Server-${{ matrix.runtime }}.tar.gz

  server-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:admin
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - run: dotnet publish server/LessonCue.Server/LessonCue.Server.csproj -c Release -r win-x64 --self-contained -o package/payload
      - shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe -OutFile package/payload/yt-dlp.exe
          Copy-Item installers/windows/Install-LessonCue.ps1 package/
          Copy-Item installers/windows/Uninstall-LessonCue.ps1 package/
          Compress-Archive -Path package/* -DestinationPath LessonCue-Server-Windows-x64.zip
      - uses: actions/upload-artifact@v4
        with:
          name: LessonCue-Server-Windows-x64
          path: LessonCue-Server-Windows-x64.zip

  android:
    runs-on: ubuntu-latest
    env:
      LESSONCUE_ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEYSTORE_PASSWORD }}
      LESSONCUE_ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_SIGNING_KEY_ALIAS }}
      LESSONCUE_ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_SIGNING_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 9.4.1
      - name: Require production Android signing material
        env:
          SIGNING_KEY_BASE64: ${{ secrets.ANDROID_SIGNING_KEY_BASE64 }}
          SIGNING_CERT_SHA256: ${{ secrets.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          test -n "${SIGNING_KEY_BASE64}" || { echo "::error::ANDROID_SIGNING_KEY_BASE64 is not configured"; exit 1; }
          test -n "${LESSONCUE_ANDROID_KEYSTORE_PASSWORD}" || { echo "::error::ANDROID_SIGNING_KEYSTORE_PASSWORD is not configured"; exit 1; }
          test -n "${LESSONCUE_ANDROID_KEY_ALIAS}" || { echo "::error::ANDROID_SIGNING_KEY_ALIAS is not configured"; exit 1; }
          test -n "${LESSONCUE_ANDROID_KEY_PASSWORD}" || { echo "::error::ANDROID_SIGNING_KEY_PASSWORD is not configured"; exit 1; }
          test -n "${SIGNING_CERT_SHA256}" || { echo "::error::ANDROID_SIGNING_CERT_SHA256 is not configured"; exit 1; }
          printf '%s' "${SIGNING_KEY_BASE64}" | base64 --decode > "${RUNNER_TEMP}/lessoncue-release.jks"
          chmod 0600 "${RUNNER_TEMP}/lessoncue-release.jks"
          echo "LESSONCUE_ANDROID_KEYSTORE_PATH=${RUNNER_TEMP}/lessoncue-release.jks" >> "${GITHUB_ENV}"
          echo "LESSONCUE_ANDROID_SIGNING_CERT_SHA256=${SIGNING_CERT_SHA256}" >> "${GITHUB_ENV}"
      - run: gradle -p android-tv :app:testDebugUnitTest :app:lintDebug :app:assembleDebug :app:assembleRelease
      - run: cp android-tv/app/build/outputs/apk/debug/app-debug.apk LessonCue-AndroidTV-debug.apk
      - name: Verify and name signed sideload APK
        run: |
          release_apk="android-tv/app/build/outputs/apk/release/app-release.apk"
          test -f "${release_apk}" || { echo "::error::The signed release APK was not produced"; exit 1; }
          apksigner="$(find "${ANDROID_HOME}/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          test -x "${apksigner}" || { echo "::error::Android apksigner was not found"; exit 1; }
          "${apksigner}" verify --verbose --print-certs "${release_apk}"
          actual_fingerprint="$("${apksigner}" verify --print-certs "${release_apk}" | awk -F': ' '/certificate SHA-256 digest/ { print toupper($NF); exit }' | tr -d ':')"
          expected_fingerprint="$(printf '%s' "${LESSONCUE_ANDROID_SIGNING_CERT_SHA256}" | tr '[:lower:]' '[:upper:]' | tr -d ':')"
          test "${actual_fingerprint}" = "${expected_fingerprint}" || { echo "::error::Release APK signing certificate does not match ANDROID_SIGNING_CERT_SHA256"; exit 1; }
          cp "${release_apk}" lessoncue-tv.apk
      - uses: actions/upload-artifact@v4
        with:
          name: LessonCue-AndroidTV
          path: |
            LessonCue-AndroidTV-debug.apk
            lessoncue-tv.apk

  publish:
    needs: [server-linux, server-windows, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release
          merge-multiple: true
      - run: cd release && sha256sum LessonCue-* lessoncue-* > SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
